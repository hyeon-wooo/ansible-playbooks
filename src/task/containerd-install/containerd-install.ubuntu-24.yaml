---
- name: containerd 설치
  block:
    - name: Ubuntu용 필요 패키지 설치
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg]
        state: present
    - name: Docker GPG 키 추가
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
    - name: Docker 저장소 등록
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
    - name: containerd.io 설치
      apt:
        name: "containerd.io={{ containerd_version_ubuntu | default('latest') }}"
        state: present
        update_cache: yes
