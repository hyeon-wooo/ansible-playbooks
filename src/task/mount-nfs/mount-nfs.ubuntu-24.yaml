---
- name: nfs-common의 의존성 패키지인 libnfsidmap1을 특정 버전으로 선행 설치 (nfs-common이 아주 엄격한 의존성 버전을 요구함.)
  apt:
    name: "libnfsidmap1=1:2.6.4-3ubuntu5"
    state: present
    update_cache: yes
    allow_downgrades: yes

- name: 패키지 리스트 업데이트 및 의존성 라이브러리 선제 설치
  apt:
    name: "nfs-common=1:2.6.4-3ubuntu5"
    state: present

- name: 마운트할 로컬 디렉토리 생성
  file:
    path: "{{ nfs_mount_path }}"
    state: directory
    mode: "0755"

- name: 마운트
  mount:
    path: "{{ nfs_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ nfs_export_path }}"
    fstype: nfs
    opts: defaults
    state: mounted
